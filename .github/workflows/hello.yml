# =====================================================
# GitHub Actions Workflow
# =====================================================

# Workflow files must be stored in:
# .github/workflows/
#
# Example:
# .github/workflows/hello.yml

# Name of the workflow
name: Hello

# Define when the workflow should run
on:
  workflow_dispatch:

# Jobs define the tasks that the workflow will execute
jobs:
  say-hello:

    # GitHub creates a fresh (ephemeral) virtual machine
    # for this job. Once the job completes, the runner is
    # automatically deleted.
    runs-on: ubuntu-latest

    # Steps are executed sequentially inside the job
    steps:
      - name: Say Hello to Everyone
        run: echo "Hello DevOps"

# =====================================================
# Notes
# =====================================================
# 1. A workflow contains one or more jobs.
# 2. A job contains one or more steps.
# 3. Each step executes a command or an action.
# 4. GitHub-hosted runners are ephemeral (temporary).
# 5. The most common runner is:
#       runs-on: ubuntu-latest
